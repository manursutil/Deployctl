# Tenant registry for the Sim Phase 0-5 Docker demo lane
# (docs/phase-0-simulation-plan.md). Values mirror tenants.yml; the secret
# names here must match the fixtures baked into
# docker/sim/app-server/secret-fixtures.json.
staging:
  client1:
    frontendBucket: skincair-staging-frontend-client1
    dbSecret: skincair/staging/db/client1
    redisSecret: skincair/staging/redis
    apiProcess: sherwood-api-client1
    workerProcess: sherwood-worker-client1
    appBaseDir: /opt/sherwood/tenants/client1
    backendHealthUrl: https://client1.sherwood.science/health
    frontendUrl: https://client1.sherwood.science

# Production is used by the Sim Phase 5 replacement demo (two app-server
# containers). Production rejects moving branch refs, so deploy with a full
# commit SHA or tag.
production:
  client1:
    frontendBucket: skincair-production-frontend-client1
    dbSecret: skincair/production/db/client1
    redisSecret: skincair/production/redis
    apiProcess: sherwood-api-client1
    workerProcess: sherwood-worker-client1
    appBaseDir: /opt/sherwood/tenants/client1
    backendHealthUrl: https://client1.sherwood.science/health
    frontendUrl: https://client1.sherwood.science
