# Simulation config for the Phase 0 Docker-based demo lane.
# See docs/phase-0-simulation-plan.md. Values here are simulation fixtures,
# not confirmed Phase 0 infrastructure facts.
adapterMode: sim

aws:
  region: eu-west-1

applicationRepository:
  # Points at this very repo so ref resolution (git ls-remote) works with no
  # extra fixture repo; `main` is a real moving branch. See Sim Phase 2 design
  # notes in docs/phase-0-simulation-plan.md.
  url: .

build:
  backend:
    packageManager: npm
    installCommand: npm ci
    buildCommand: npm run build
  frontend:
    packageManager: npm
    installCommand: npm ci
    buildCommand: npm run build
    buildConfigIdentityInputs:
      - VITE_TENANT
      - VITE_ENVIRONMENT

deployHistory:
  bucket: deployctl-sim-deploy-history
  prefix: deploys

frontendArtifacts:
  bucket: deployctl-sim-deploy-artifacts
  prefix: frontend

refPolicies:
  staging:
    allowMovingBranches: true
  production:
    allowMovingBranches: false

ssmTargets:
  staging:
    mode: instanceIds
    # Reused as Docker container names by DockerSimSsmDeployExecutor (Sim Phase 2).
    instanceIds:
      - deployctl-sim-app-server-staging
  production:
    # In real infra this is an ASG (see deployctl.config.yml). The simulation stands
    # in for the ASG's healthy instances with two named production containers
    # (Sim Phase 5 replacement demo), addressed as instanceIds.
    mode: instanceIds
    instanceIds:
      - deployctl-sim-app-server-production-1
      - deployctl-sim-app-server-production-2

backendDeploy:
  releaseRoot: /opt/sherwood/releases
  osUser: sherwood

retention:
  successfulVersionsPerTarget: 10
  keepDays: 30
