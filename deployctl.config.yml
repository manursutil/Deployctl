aws:
  region: eu-west-1

applicationRepository:
  url: ssh://git@bitbucket.org/example/application-monorepo.git

build:
  backend:
    packageManager: npm
    installCommand: npm ci
    buildCommand: npm run build
  frontend:
    packageManager: npm
    installCommand: npm ci
    buildCommand: npm run build
    buildConfigIdentityInputs:
      - VITE_TENANT
      - VITE_ENVIRONMENT

deployHistory:
  bucket: skincair-staging-deploy-history
  prefix: deploys

frontendArtifacts:
  bucket: skincair-staging-deploy-artifacts
  prefix: frontend

refPolicies:
  staging:
    allowMovingBranches: true
  production:
    allowMovingBranches: false

# SSM Run Command target selection per environment. Placeholder identifiers
# until Phase 0 discovery confirms the real staging instances and production ASG.
ssmTargets:
  staging:
    mode: instanceIds
    instanceIds:
      - i-0000000000staging0
  production:
    mode: asg
    autoScalingGroupName: sherwood-production-asg

# Assumed EC2 layout for the backend deploy script. Placeholder until Phase 0
# discovery confirms the real release root and OS user (docs/phase-0-checklist.md A1).
backendDeploy:
  releaseRoot: /opt/sherwood/releases
  osUser: sherwood

retention:
  successfulVersionsPerTarget: 10
  keepDays: 30
